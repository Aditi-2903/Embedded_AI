<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Embedded AI Book</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #16213e;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 1.3rem;
      color: #e94560;
      letter-spacing: 1px;
    }

    #page-info {
      font-size: 0.9rem;
      color: #aaa;
    }

    #toolbar {
      background: #0f3460;
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    button:hover { background: #c73652; }
    button:disabled { background: #555; cursor: not-allowed; }

    #page-input {
      width: 60px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #eee;
      text-align: center;
      font-size: 0.9rem;
    }

    label { font-size: 0.9rem; color: #ccc; }

    #zoom-select {
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #eee;
      font-size: 0.9rem;
    }

    #canvas-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px;
      overflow: auto;
    }

    #book-wrapper {
      background: white;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), -4px 0 12px rgba(0,0,0,0.3);
      position: relative;
      transition: box-shadow 0.3s;
    }

    /* spine effect */
    #book-wrapper::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: linear-gradient(to right, #888, #ddd, #aaa);
      border-radius: 4px 0 0 4px;
    }

    canvas { display: block; }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      gap: 16px;
      z-index: 100;
    }

    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 0.75rem;
      color: #555;
    }

    #search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    #search-input {
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1a1a2e;
      color: #eee;
      font-size: 0.9rem;
      width: 160px;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading book...</span>
</div>

<header>
  <h1>Embedded AI</h1>
  <span id="page-info">Page — / —</span>
</header>

<div id="toolbar">
  <button id="btn-first" title="First page">&#171; First</button>
  <button id="btn-prev" title="Previous page">&#8249; Prev</button>
  <label>Page <input type="number" id="page-input" min="1" value="1"/> </label>
  <button id="btn-next" title="Next page">Next &#8250;</button>
  <button id="btn-last" title="Last page">Last &#187;</button>

  <label>Zoom
    <select id="zoom-select">
      <option value="0.6">60%</option>
      <option value="0.75">75%</option>
      <option value="1" selected>100%</option>
      <option value="1.25">125%</option>
      <option value="1.5">150%</option>
      <option value="2">200%</option>
    </select>
  </label>

  <div id="search-bar">
    <input type="number" id="search-input" placeholder="Go to page..." min="1"/>
    <button id="btn-go">Go</button>
  </div>
</div>

<div id="canvas-container">
  <div id="book-wrapper">
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<footer>Embedded AI Book Reader</footer>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL = './Embedded_AI_Book.pdf';
  let pdfDoc = null;
  let currentPage = 1;
  let scale = 1;
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');

  async function renderPage(num) {
    const page = await pdfDoc.getPage(num);
    const viewport = page.getViewport({ scale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({ canvasContext: ctx, viewport }).promise;

    document.getElementById('page-info').textContent = `Page ${num} / ${pdfDoc.numPages}`;
    document.getElementById('page-input').value = num;
    document.getElementById('btn-prev').disabled = num <= 1;
    document.getElementById('btn-first').disabled = num <= 1;
    document.getElementById('btn-next').disabled = num >= pdfDoc.numPages;
    document.getElementById('btn-last').disabled = num >= pdfDoc.numPages;
  }

  async function goToPage(num) {
    num = Math.max(1, Math.min(num, pdfDoc.numPages));
    currentPage = num;
    await renderPage(currentPage);
    document.getElementById('canvas-container').scrollTo({ top: 0, behavior: 'smooth' });
  }

  pdfjsLib.getDocument(PDF_URL).promise.then(doc => {
    pdfDoc = doc;
    document.getElementById('page-input').max = doc.numPages;
    document.getElementById('search-input').max = doc.numPages;
    renderPage(currentPage).then(() => {
      document.getElementById('loading').style.display = 'none';
    });
  }).catch(err => {
    document.getElementById('loading').innerHTML =
      `<p style="color:#e94560">Failed to load PDF.<br>${err.message}</p>`;
  });

  document.getElementById('btn-prev').addEventListener('click', () => goToPage(currentPage - 1));
  document.getElementById('btn-next').addEventListener('click', () => goToPage(currentPage + 1));
  document.getElementById('btn-first').addEventListener('click', () => goToPage(1));
  document.getElementById('btn-last').addEventListener('click', () => goToPage(pdfDoc.numPages));

  document.getElementById('page-input').addEventListener('change', e => {
    goToPage(parseInt(e.target.value));
  });

  document.getElementById('zoom-select').addEventListener('change', e => {
    scale = parseFloat(e.target.value);
    renderPage(currentPage);
  });

  document.getElementById('btn-go').addEventListener('click', () => {
    const val = parseInt(document.getElementById('search-input').value);
    if (!isNaN(val)) goToPage(val);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToPage(currentPage + 1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToPage(currentPage - 1);
  });
</script>
</body>
</html>
