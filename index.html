<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Embedded AI — Book Reader</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #e8e0d4;
      --sidebar-bg: #2c3e50;
      --page-bg: #ffffff;
      --page-shadow: rgba(0,0,0,0.2);
      --ink: #1a1a1a;
      --accent: #2980b9;
      --gold: #f39c12;
      --sidebar-text: #ecf0f1;
      --sidebar-hover: rgba(255,255,255,0.1);
      --sidebar-active: rgba(255,255,255,0.18);
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Georgia', serif;
      color: var(--ink);
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(0,0,0,0.15);
      overflow: hidden;
    }

    #sidebar-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    #sidebar-header h1 {
      color: #ffffff;
      font-size: 1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.4;
    }

    #sidebar-header p {
      color: #bdc3c7;
      font-size: 0.7rem;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    #sidebar-search {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #sidebar-search input {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: var(--sidebar-text);
      padding: 6px 10px;
      font-size: 0.8rem;
      outline: none;
    }

    #sidebar-search input::placeholder { color: #95a5a6; }

    #chapter-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: #3a2a10 transparent;
    }

    .part-label {
      color: #95a5a6;
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 20px 4px;
    }

    .chapter-item {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 7px 20px;
      cursor: pointer;
      color: #bdc3c7;
      font-size: 0.78rem;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s;
      border-left: 2px solid transparent;
    }

    .chapter-item:hover {
      background: var(--sidebar-hover);
      color: var(--sidebar-text);
    }

    .chapter-item.active {
      background: var(--sidebar-active);
      color: var(--gold);
      border-left-color: var(--gold);
    }

    .chapter-num {
      color: #7f8c8d;
      font-size: 0.65rem;
      min-width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .chapter-item.active .chapter-num { color: #ffffff; }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #dde3ea;
    }

    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      border-bottom: 1px solid #c5cdd6;
      background: #f0f3f6;
    }

    #topbar button {
      background: #2c3e50;
      border: none;
      color: #ffffff;
      padding: 5px 14px;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 0.8rem;
      transition: all 0.15s;
    }

    #topbar button:hover { background: #1a252f; }
    #topbar button:disabled { opacity: 0.35; cursor: not-allowed; }

    #chapter-title-bar {
      flex: 1;
      color: #555f6b;
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Book page ── */
    #book-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      justify-content: center;
      padding: 40px 24px 60px;
      scrollbar-width: thin;
      scrollbar-color: #a0aab4 transparent;
    }

    #page {
      background: #ffffff;
      width: 100%;
      max-width: 720px;
      min-height: 100%;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      padding: 64px 72px;
      position: relative;
    }

    /* Spine line */
    #page::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: #2c3e50;
      border-radius: 4px 0 0 4px;
    }

    /* ── Markdown styles ── */
    #page-content { position: relative; z-index: 1; }

    #page-content h1 {
      font-size: 1.8rem;
      color: #1a1a2e;
      border-bottom: 2px solid #2c3e50;
      padding-bottom: 12px;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    #page-content h1 + p em {
      color: #555f6b;
      font-size: 0.95rem;
    }

    #page-content h2 {
      font-size: 1.2rem;
      color: #1a252f;
      margin-top: 36px;
      margin-bottom: 10px;
      padding-bottom: 4px;
      border-bottom: 1px solid #d5dde6;
    }

    #page-content h3 {
      font-size: 1rem;
      color: #2c3e50;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    #page-content p {
      color: #2d2d2d;
      line-height: 1.85;
      margin-bottom: 14px;
      font-size: 0.98rem;
    }

    #page-content ul, #page-content ol {
      padding-left: 24px;
      margin-bottom: 14px;
    }

    #page-content li {
      color: #2d2d2d;
      line-height: 1.75;
      font-size: 0.97rem;
      margin-bottom: 4px;
    }

    #page-content strong { color: #111; }

    #page-content blockquote {
      border-left: 3px solid #2980b9;
      margin: 20px 0;
      padding: 10px 20px;
      background: #eaf4fb;
      border-radius: 0 4px 4px 0;
      font-style: italic;
      color: #2c3e50;
    }

    #page-content blockquote p { margin-bottom: 0; color: #2c3e50; }

    #page-content code {
      background: #f0f3f6;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 0.88em;
      color: #c0392b;
    }

    #page-content pre {
      background: #2c3e50;
      border-radius: 6px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 20px 0;
    }

    #page-content pre code {
      background: transparent;
      color: #ecf0f1;
      font-size: 0.87rem;
      padding: 0;
    }

    #page-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 0.88rem;
    }

    #page-content th {
      background: #2c3e50;
      color: #ffffff;
      padding: 8px 12px;
      text-align: left;
    }

    #page-content td {
      padding: 7px 12px;
      border-bottom: 1px solid #dde3ea;
      color: #2d2d2d;
    }

    #page-content tr:hover td { background: #f5f7fa; }

    #page-content a { color: #2980b9; text-decoration: none; }
    #page-content a:hover { text-decoration: underline; }

    #page-content hr {
      border: none;
      border-top: 1px solid #dde3ea;
      margin: 32px 0;
    }

    /* TODO comments hidden visually but visible in source */
    #page-content .todo-note {
      background: #fef9e7;
      border: 1px dashed #f39c12;
      border-radius: 4px;
      padding: 8px 14px;
      color: #7d6608;
      font-size: 0.82rem;
      font-style: italic;
      margin: 10px 0;
    }

    /* Loading */
    #loading-page {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: #7f8c8d;
      font-style: italic;
    }

    /* Cover page */
    #cover {
      text-align: center;
      padding: 60px 40px;
    }

    #cover .ornament { font-size: 3rem; color: #2c3e50; margin-bottom: 32px; }

    #cover h1 {
      font-size: 2.2rem;
      color: #1a252f;
      border: none;
      border-top: 2px solid #2c3e50;
      border-bottom: 2px solid #2c3e50;
      padding: 16px 0;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    #cover .subtitle {
      color: #555f6b;
      font-size: 1rem;
      font-style: italic;
      margin-bottom: 32px;
    }

    #cover .meta {
      color: #7f8c8d;
      font-size: 0.82rem;
      line-height: 2;
    }

    #cover .start-btn {
      display: inline-block;
      margin-top: 40px;
      background: #2c3e50;
      color: #ffffff;
      padding: 12px 32px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 1px;
      border: none;
      font-family: 'Georgia', serif;
      transition: background 0.2s;
    }

    #cover .start-btn:hover { background: #1a252f; }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div id="sidebar-header">
    <h1>Embedded Systems &amp; AI</h1>
    <p>Working Draft v0.1</p>
  </div>
  <div id="sidebar-search">
    <input type="text" id="search" placeholder="Search chapters..." />
  </div>
  <div id="chapter-list"></div>
</nav>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <button id="btn-prev">&#8592; Prev</button>
    <div id="chapter-title-bar">—</div>
    <button id="btn-next">Next &#8594;</button>
  </div>
  <div id="book-scroll">
    <div id="page">
      <div id="page-content">
        <div id="cover">
          <div class="ornament">&#9670;</div>
          <h1>Embedded Systems &amp; AI</h1>
          <p class="subtitle">Constraints, Inference, and Integration</p>
          <div class="meta">
            Version 0.1 — Working Draft<br>
            15-week Course Textbook<br>
            ECE / CS — Final Year Undergraduate
          </div>
          <button class="start-btn" id="cover-start">Begin Reading &#8594;</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const CHAPTERS = [
  { label: 'Cover', file: null, num: '', part: null },
  { label: 'Part I — The Embedded-AI Problem', file: null, num: '', part: true },
  { label: 'When AI Meets Constrained Hardware', file: 'chapters/chapter-01-when-ai-meets-constrained-hardware.md', num: '1' },
  { label: 'Embedded Constraints as Design Variables', file: 'chapters/chapter-02-embedded-constraints-as-design-variables.md', num: '2' },
  { label: 'Machine Learning for Embedded Engineers', file: 'chapters/chapter-03-ml-for-embedded-engineers.md', num: '3' },
  { label: 'Part II — Inference-First Evaluation', file: null, num: '', part: true },
  { label: 'Inference Mechanics', file: 'chapters/chapter-04-inference-mechanics.md', num: '4' },
  { label: 'Memory: Constrained Spaces', file: 'chapters/chapter-05-memory.md', num: '5' },
  { label: 'Compute: Latency & Throughput', file: 'chapters/chapter-06-compute.md', num: '6' },
  { label: 'Power and Energy', file: 'chapters/chapter-07-power-and-energy.md', num: '7' },
  { label: 'Hardware for AI', file: 'chapters/chapter-08-hardware-for-ai.md', num: '8' },
  { label: 'Communication & Edge-Cloud', file: 'chapters/chapter-09-communication-edge-cloud.md', num: '9' },
  { label: 'Real-Time AI', file: 'chapters/chapter-10-real-time-ai.md', num: '10' },
  { label: 'Part III — Model-Aware Design', file: null, num: '', part: true },
  { label: 'Selecting Models', file: 'chapters/chapter-11-model-selection.md', num: '11' },
  { label: 'Optimizing Models', file: 'chapters/chapter-12-model-optimization.md', num: '12' },
  { label: 'TinyML Toolchains', file: 'chapters/chapter-13-tinyml-toolchains.md', num: '13' },
  { label: 'Integration Case Studies', file: 'chapters/chapter-14-integration-case-studies.md', num: '14' },
  { label: 'Appendices', file: null, num: '', part: true },
  { label: 'Appendix A — Embedded Reference', file: 'chapters/appendix-a-embedded-quick-reference.md', num: 'A' },
  { label: 'Appendix B — ML Reference', file: 'chapters/appendix-b-ml-quick-reference.md', num: 'B' },
  { label: 'Appendix C — Hardware Reference', file: 'chapters/appendix-c-hardware-reference.md', num: 'C' },
  { label: 'Appendix D — Toolchain Setup', file: 'chapters/appendix-d-toolchain-setup.md', num: 'D' },
];

// Navigable items (have files or are cover)
const navItems = CHAPTERS.map((c, i) => ({ ...c, idx: i })).filter(c => !c.part);

let currentNavIdx = 0; // index into navItems

// Build sidebar
const list = document.getElementById('chapter-list');

CHAPTERS.forEach((ch, i) => {
  if (ch.part) {
    const div = document.createElement('div');
    div.className = 'part-label';
    div.textContent = ch.label;
    list.appendChild(div);
    return;
  }
  const div = document.createElement('div');
  div.className = 'chapter-item';
  div.dataset.idx = i;
  div.innerHTML = `<span class="chapter-num">${ch.num}</span><span>${ch.label}</span>`;
  div.addEventListener('click', () => {
    const ni = navItems.findIndex(n => n.idx === i);
    if (ni !== -1) loadNavItem(ni);
  });
  list.appendChild(div);
});

function setActiveItem(chapIdx) {
  document.querySelectorAll('.chapter-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.idx) === chapIdx);
  });
}

async function loadNavItem(ni) {
  currentNavIdx = ni;
  const ch = navItems[ni];
  setActiveItem(ch.idx);

  document.getElementById('btn-prev').disabled = ni === 0;
  document.getElementById('btn-next').disabled = ni === navItems.length - 1;
  document.getElementById('chapter-title-bar').textContent = ch.file ? `${ch.num ? 'Ch. ' + ch.num + ' — ' : ''}${ch.label}` : ch.label;

  const content = document.getElementById('page-content');
  document.getElementById('book-scroll').scrollTo({ top: 0 });

  if (!ch.file) {
    // Cover
    content.innerHTML = `
      <div id="cover">
        <div class="ornament">&#9670;</div>
        <h1>Embedded Systems &amp; AI</h1>
        <p class="subtitle">Constraints, Inference, and Integration</p>
        <div class="meta">
          Version 0.1 — Working Draft<br>
          15-week Course Textbook<br>
          ECE / CS — Final Year Undergraduate
        </div>
        <button class="start-btn" id="cover-start">Begin Reading &#8594;</button>
      </div>`;
    document.getElementById('cover-start').addEventListener('click', () => loadNavItem(1));
    return;
  }

  content.innerHTML = '<div id="loading-page">Loading chapter...</div>';

  try {
    const res = await fetch(ch.file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    let md = await res.text();

    // Strip HTML comments (<!-- TODO --> etc) but show as styled notes
    md = md.replace(/<!--\s*TODO[^>]*-->/g, '<div class="todo-note">✎ Section pending — contributions welcome. See <a href="https://github.com/Aditi-2903/Embedded_AI/blob/main/CONTRIBUTING.md">CONTRIBUTING.md</a></div>');

    const html = marked.parse(md);
    content.innerHTML = html;

    // Make internal .md links work
    content.querySelectorAll('a[href$=".md"]').forEach(a => {
      const href = a.getAttribute('href');
      const match = href.match(/chapter-(\d+)|appendix-([a-d])/i);
      if (match) {
        a.addEventListener('click', e => {
          e.preventDefault();
          const target = navItems.findIndex(n => n.file && n.file.includes(href.replace('./', '').replace('../', '')));
          if (target !== -1) loadNavItem(target);
        });
      }
    });
  } catch (e) {
    content.innerHTML = `<p style="color:#c0392b;padding:20px">Could not load chapter: ${e.message}</p>`;
  }
}

document.getElementById('btn-prev').addEventListener('click', () => loadNavItem(currentNavIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => loadNavItem(currentNavIdx + 1));
document.getElementById('cover-start').addEventListener('click', () => loadNavItem(1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { if (currentNavIdx < navItems.length - 1) loadNavItem(currentNavIdx + 1); }
  if (e.key === 'ArrowLeft')  { if (currentNavIdx > 0) loadNavItem(currentNavIdx - 1); }
});

// Search
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.chapter-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
  document.querySelectorAll('.part-label').forEach(el => {
    el.style.display = q ? 'none' : '';
  });
});

// Init: show cover selected
setActiveItem(0);
document.getElementById('btn-prev').disabled = true;
</script>
</body>
</html>
